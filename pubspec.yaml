name: stuntingcare_app
description: "StuntingCare - AI-powered stunting prevention mobile application"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.1

  # HTTP & API (untuk Gemini langsung dari Flutter)
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  flutter_markdown: ^0.7.6


  # Env
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21

